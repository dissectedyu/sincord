name: Build Branches

on:
    push:
        branches:
            - "**"
            - "!pr-**"
    workflow_dispatch:
        inputs:
            branch:
                type: choice
                description: "Branch to build and upload"
                options:
                    - main
                    - dev
                    - translation
                default: "dev"

env:
    FORCE_COLOR: true

permissions:
    contents: write

jobs:
    Build:
        name: Build Sincord
        runs-on: ubuntu-latest
        if: github.repository == 'sincord/sincord'

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.inputs.branch || github.ref }}
                  fetch-depth: 1

            - uses: pnpm/action-setup@v4

            - name: Use Node.js 24
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build web
              run: pnpm buildWebStandalone

            - name: Build
              run: pnpm buildStandalone

            - name: Generate plugin lists
              run: |
                  pnpm generatePluginJson dist/plugins.json
                  pnpm generateSincordPluginJson dist/sincordplugins.json
                  pnpm generateVencordPluginJson dist/vencordplugins.json
                  pnpm generateDevsList dist/devs.json

            - name: Upload to Sincord builds repo
              if: ${{ vars.ACT == 'false' && secrets.STOKEN != '' }}
              env:
                  GITHUB_TOKEN: ${{ secrets.STOKEN }}
                  REPO: sincord/sincord-builds
                  USERNAME: GitHub-Actions
              run: |
                  BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
                  COMMIT_SHA=$(git rev-parse --short HEAD)

                  git config --global user.name "GitHub-Actions"
                  git config --global user.email actions@github.com
                  git clone https://$USERNAME:$GITHUB_TOKEN@github.com/$REPO.git sincord-builds
                  cd sincord-builds

                  if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
                      git checkout "$BRANCH"
                  else
                      git checkout --orphan "$BRANCH"
                  fi

                  cp -r ../dist/* .
                  find . -size 0 -delete

                  mkdir -p userscript sinbop desktop browser
                  mv Sincord.user.* userscript/ 2>/dev/null || true
                  mv desktop.asar desktop/ 2>/dev/null || true
                  mv sinbop.asar sinbop/ 2>/dev/null || true
                  mv extension-*.zip browser/ 2>/dev/null || true

                  git add -A
                  git commit -m "Builds for https://github.com/$GITHUB_REPOSITORY/commit/$COMMIT_SHA"
                  git push --force https://$USERNAME:$GITHUB_TOKEN@github.com/$REPO.git "$BRANCH"
