name: NixOS Build
on:
    workflow_dispatch:
    schedule:
        - cron: 0 0 * * *

env:
    FORCE_COLOR: true
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
    contents: write

jobs:
    Build:
        name: Build Sincord
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - uses: pnpm/action-setup@v4

            - name: Use Node.js 24
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build web
              run: pnpm buildWebStandalone

            - name: Build
              run: pnpm buildStandalone

            - name: Generate plugin lists
              run: |
                  pnpm generatePluginJson dist/plugins.json
                  pnpm generateSincordPluginJson dist/sincordplugins.json
                  pnpm generateVencordPluginJson dist/vencordplugins.json
                  pnpm generateDevsList dist/devs.json

            - name: Collect files to be released
              run: |
                  cd dist
                  mkdir release

                  cp browser/browser.* release 2>/dev/null || true
                  cp Sincord.user.{js,js.LEGAL.txt} release 2>/dev/null || true

                  cp *.{json,zip,asar} release 2>/dev/null || true

                  cp desktop/* release 2>/dev/null || true
                  for file in sinbop/*; do
                    [ -f "$file" ] || continue
                    filename=$(basename "$file")
                    cp "$file" "release/sinbop${filename^}"
                  done

                  find release -size 0 -delete
                  rm -f release/package.json release/*.map

            - name: Get current date
              id: date
              run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

            - name: Upload Sincord Stable
              if: ${{ vars.ACT == 'false' }}
              run: |
                  gh release create ${{ steps.date.outputs.date }} --latest=false || true
                  gh release upload ${{ steps.date.outputs.date }} --clobber dist/release/*
