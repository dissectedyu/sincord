name: Build & Release

on:
  push:
    tags: ['v*']

jobs:
  build-sincord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: desktop.asar
          path: dist/desktop.asar

  build-installer:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            output: Sinlotl-windows-amd64.exe
            goos: windows
            goarch: amd64
          - os: macos-latest
            output: Sinlotl-darwin-arm64
            goos: darwin
            goarch: arm64
          - os: macos-13
            output: Sinlotl-darwin-amd64
            goos: darwin
            goarch: amd64
          - os: ubuntu-latest
            output: Sinlotl-linux-amd64
            goos: linux
            goarch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: installer/go.sum

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Build installer
        working-directory: installer
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w" -o ${{ matrix.output }} .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: installer/${{ matrix.output }}

  release:
    needs: [build-sincord, build-installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true